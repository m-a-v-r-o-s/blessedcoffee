    <link rel="preload" as="image" href="/background.webp" fetchpriority="high" />

        l.id = 'gfonts';

        l.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Barlow+Semi+Condensed:wght@300;400;500;600;700&display=swap';
